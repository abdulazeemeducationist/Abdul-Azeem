openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MCQ Practice App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: courses
    description: Courses management
  - name: subjects
    description: Subjects management
  - name: chapters
    description: Chapters management
  - name: topics
    description: Topics management
  - name: questions
    description: Questions management
  - name: progress
    description: User progress
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/signin:
    post:
      operationId: signIn
      tags: [auth]
      summary: Sign in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: Get all courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{courseId}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a specific course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{courseId}/subjects:
    get:
      operationId: getSubjectsByCourse
      tags: [subjects]
      summary: Get subjects for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"

  /subjects/{subjectId}/chapters:
    get:
      operationId: getChaptersBySubject
      tags: [chapters]
      summary: Get chapters for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"

  /chapters/{chapterId}/topics:
    get:
      operationId: getTopicsByChapter
      tags: [topics]
      summary: Get topics for a chapter
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /topics/{topicId}/questions:
    get:
      operationId: getQuestionsByTopic
      tags: [questions]
      summary: Get questions for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /progress:
    get:
      operationId: getUserProgress
      tags: [progress]
      summary: Get user progress for all topics
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProgress"

  /progress/save:
    post:
      operationId: saveProgress
      tags: [progress]
      summary: Save or update user progress for a topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProgressInput"
      responses:
        "200":
          description: Progress saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProgress"

  # ── ADMIN: STATS ──────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin statistics dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── ADMIN: COURSES ─────────────────────────────────────────────────────────
  /admin/courses:
    get:
      operationId: getAdminCourses
      tags: [admin]
      summary: Get all courses (admin view with full details)
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [admin]
      summary: Create a new course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /admin/courses/{courseId}:
    put:
      operationId: updateCourse
      tags: [admin]
      summary: Update a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "200":
          description: Course updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [admin]
      summary: Delete a course and all its content
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/courses/{courseId}/active:
    patch:
      operationId: toggleCourseActive
      tags: [admin]
      summary: Toggle course active state
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleActiveInput"
      responses:
        "200":
          description: Course updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /admin/courses/{courseId}/order:
    patch:
      operationId: reorderCourse
      tags: [admin]
      summary: Swap course order with another course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderInput"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── ADMIN: SUBJECTS ────────────────────────────────────────────────────────
  /admin/subjects:
    get:
      operationId: getAllSubjects
      tags: [admin]
      summary: Get all subjects across all courses
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [admin]
      summary: Create a new subject (paper)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /admin/subjects/{subjectId}:
    put:
      operationId: updateSubject
      tags: [admin]
      summary: Update a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "200":
          description: Subject updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [admin]
      summary: Delete a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subject deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/subjects/{subjectId}/active:
    patch:
      operationId: toggleSubjectActive
      tags: [admin]
      summary: Toggle subject active/locked state
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleActiveInput"
      responses:
        "200":
          description: Subject updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /admin/subjects/{subjectId}/chapters:
    get:
      operationId: getAdminChaptersBySubject
      tags: [admin]
      summary: Get all chapters for a subject (admin, includes inactive)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"

  # ── ADMIN: CHAPTERS ────────────────────────────────────────────────────────
  /admin/chapters:
    post:
      operationId: createChapter
      tags: [admin]
      summary: Create a new chapter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterInput"
      responses:
        "201":
          description: Chapter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"

  /admin/chapters/{chapterId}:
    put:
      operationId: updateChapter
      tags: [admin]
      summary: Update a chapter
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterInput"
      responses:
        "200":
          description: Chapter updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
    delete:
      operationId: deleteChapter
      tags: [admin]
      summary: Delete a chapter
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chapter deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/chapters/{chapterId}/active:
    patch:
      operationId: toggleChapterActive
      tags: [admin]
      summary: Toggle chapter published/unpublished state
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleActiveInput"
      responses:
        "200":
          description: Chapter updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"

  /admin/chapters/{chapterId}/topics:
    get:
      operationId: getAdminTopicsByChapter
      tags: [admin]
      summary: Get all topics for a chapter (admin)
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  # ── ADMIN: TOPICS ──────────────────────────────────────────────────────────
  /admin/topics:
    post:
      operationId: createTopic
      tags: [admin]
      summary: Create a new topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "201":
          description: Topic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /admin/topics/{topicId}:
    put:
      operationId: updateTopic
      tags: [admin]
      summary: Update a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "200":
          description: Topic updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
    delete:
      operationId: deleteTopic
      tags: [admin]
      summary: Delete a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/topics/reorder:
    patch:
      operationId: reorderTopics
      tags: [admin]
      summary: Reorder topics within a chapter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicReorderInput"
      responses:
        "200":
          description: Topics reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── ADMIN: QUESTIONS ───────────────────────────────────────────────────────
  /admin/questions:
    get:
      operationId: getAdminQuestions
      tags: [admin]
      summary: Get questions filtered by subject, chapter, or topic
      parameters:
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: chapterId
          in: query
          schema:
            type: integer
        - name: topicId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [admin]
      summary: Create a new MCQ question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /admin/questions/import:
    post:
      operationId: importQuestions
      tags: [admin]
      summary: Bulk import questions from JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionImportInput"
      responses:
        "200":
          description: Questions imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /admin/questions/{questionId}:
    get:
      operationId: getAdminQuestion
      tags: [admin]
      summary: Get a single question by ID
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    put:
      operationId: updateQuestion
      tags: [admin]
      summary: Update a question
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "200":
          description: Question updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [admin]
      summary: Delete a question
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── ADMIN: STUDENTS ────────────────────────────────────────────────────────
  /admin/students:
    get:
      operationId: getStudents
      tags: [admin]
      summary: Get all students with their assigned subjects
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentDetail"
    post:
      operationId: createStudent
      tags: [admin]
      summary: Create a student account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/students/{userId}:
    put:
      operationId: updateStudent
      tags: [admin]
      summary: Update student details
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/students/{userId}/block:
    patch:
      operationId: toggleStudentBlock
      tags: [admin]
      summary: Block or unblock a student
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockInput"
      responses:
        "200":
          description: Student block state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/students/{userId}/subjects:
    post:
      operationId: assignSubjectToStudent
      tags: [admin]
      summary: Assign a subject/paper to a student
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectAssignInput"
      responses:
        "200":
          description: Subject assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/students/{userId}/subjects/{subjectId}:
    delete:
      operationId: revokeSubjectFromStudent
      tags: [admin]
      summary: Revoke subject access from a student
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: subjectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subject revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SignUpInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    SignInInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    ResetPasswordInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, admin]
        whatsappNumber:
          type: ["string", "null"]
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    Course:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        description:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        isActive:
          type: boolean
        orderNumber:
          type: integer
        subjectCount:
          type: ["integer", "null"]
        questionCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - code
        - createdAt

    CourseInput:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        icon:
          type: string
        color:
          type: string
      required:
        - name
        - code

    ToggleActiveInput:
      type: object
      properties:
        isActive:
          type: boolean
      required:
        - isActive

    ReorderInput:
      type: object
      properties:
        targetId:
          type: integer
        direction:
          type: string
          enum: [up, down]
      required:
        - direction

    Subject:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        levelId:
          type: ["integer", "null"]
        name:
          type: string
        code:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        chapterCount:
          type: ["integer", "null"]
        questionCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - courseId
        - name
        - code
        - createdAt

    SubjectInput:
      type: object
      properties:
        courseId:
          type: integer
        levelId:
          type: ["integer", "null"]
        name:
